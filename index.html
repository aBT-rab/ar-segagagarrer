<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>AR</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    a-scene {
      width: 100vw !important;
      height: 100vh !important;
      height: 100dvh !important;
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
    }
  </style>
</head>
<body>
  <a-scene
    embedded
    mindar-image="
      imageTargetSrc: https://raw.githubusercontent.com/aBT-rab/ar-segagagarrer/main/targets.mind;
      filterMinCF: 0.001;
      filterBeta: 0.001;
      missTolerance: 5;
      warmupTolerance: 5;
    "
    color-space="sRGB"
    renderer="colorManagement: true; alpha: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <a-asset-item
        id="model"
        src="https://raw.githubusercontent.com/aBT-rab/ar-segagagarrer/main/mamasegareholo.glb"
      ></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model
        src="#model"
        position="0 0 0"
        scale="0.2 0.2 0.2"
        rotation="0 180 0"
      ></a-gltf-model>

      <a-light type="ambient" intensity="1"></a-light>
      <a-light type="directional" position="0 1 1" intensity="1"></a-light>
    </a-entity>
  </a-scene>
</body>
</html>
