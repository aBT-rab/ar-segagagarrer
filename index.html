<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <a-scene
    mindar-image="imageTargetSrc: https://raw.githubusercontent.com/aBT-rab/ar-segagagarrer/main/targets.mind"
    style="width:100vw; height:100vh; position:fixed; top:0; left:0;"
    color-space="sRGB"
    renderer="colorManagement: true; alpha: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >

    <!-- モデル読み込み -->
    <a-assets>
      <a-asset-item 
        id="model" 
        src="https://raw.githubusercontent.com/aBT-rab/ar-segagagarrer/main/mamasegareholo.glb">
      </a-asset-item>
    </a-assets>

    <!-- カメラ -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- ターゲット検出 -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- 3Dモデル -->
      <a-gltf-model
        src="#model"
        position="0 0 0"
        scale="0.2 0.2 0.2"
        rotation="0 180 0"
      ></a-gltf-model>

      <!-- 光（これで見えやすくなる） -->
      <a-light type="ambient" intensity="1"></a-light>
      <a-light type="directional" position="0 1 1"></a-light>

    </a-entity>

  </a-scene>
</body>
</html>
