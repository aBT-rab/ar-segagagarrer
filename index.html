<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <a-scene
    mindar-image="imageTargetSrc: https://raw.githubusercontent.com/aBT-rab/ar-segagagarrer/main/targets.mind"
    color-space="sRGB"
    renderer="colorManagement: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <a-asset-item id="model" src="https://raw.githubusercontent.com/aBT-rab/ar-segagagarrer/main/mamasegareholo.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity
      mindar-image-target="targetIndex: 0"
      rotation="-90 0 0"
    >
      <a-gltf-model
        src="#model"
        position="0 0 0.1"
        rotation="-90 0 0"
        scale="0.2 0.2 0.2"
      ></a-gltf-model>
    </a-entity>
  </a-scene>
</body>
</html>
